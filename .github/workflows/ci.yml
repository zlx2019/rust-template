name: CI

# When pushing the main branch
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # 格式化、Clippy 静态检查与文档构建检查
  lint:
    name: Format & Clippy & Doc
    if: github.repository != 'zlx2019/rust-template'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: cargo doc
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  # 单元测试与集成测试（使用 nextest）
  test:
    name: Test
    if: github.repository != 'zlx2019/rust-template'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - name: cargo nextest
        run: cargo nextest run --all-features --no-tests pass

  # 依赖的安全公告与许可证审计
  deny:
    name: Cargo Deny
    if: github.repository != 'zlx2019/rust-template'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2

  # 拼写检查
  typos:
    name: Typos
    if: github.repository != 'zlx2019/rust-template'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # 锁定版本，避免上游 master 变更导致 CI 意外失败（dependabot 会定期升级）
      - uses: crate-ci/typos@v1.48.0
