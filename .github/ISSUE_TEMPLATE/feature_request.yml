name: 功能请求
description: 为这个项目提出一个新想法
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: background
    attributes:
      label: 需求背景
      description: 这个功能要解决什么问题
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望方案
      description: 你希望如何实现
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过的其他实现方式
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
    validations:
      required: false
