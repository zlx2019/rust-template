name: Bug 报告
description: 报告一个缺陷以帮助我们改进
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述这个 Bug
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 描述你期望发生什么
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      value: |
        - OS:
        - Rust 版本:
        - 项目版本 / commit:
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 日志、截图等其他有助于定位问题的信息
    validations:
      required: false
